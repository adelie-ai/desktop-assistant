# Minimal daemon.toml for the prove-the-split smoke test.
#
# Structural blocks ([connections], [purposes], [personality], [ws_auth]) are
# file-only (no env override), so they must ship via ConfigMap. Transport / DB /
# secret / login knobs come from env in the Deployment.
#
# Inference points at the in-cluster `ollama` Service (40-ollama.yaml) with a
# small CPU model — self-contained test inference, no external host needed. The
# production backend (Bedrock/OpenAI) is a one-line swap here + a secret.
apiVersion: v1
kind: ConfigMap
metadata:
  name: adele-daemon-config
  namespace: adele-test
data:
  daemon.toml: |
    [llm]
    connector = "ollama"
    model = "llama3.2:1b"
    base_url = "http://ollama:11434"

    [connections.default]
    type = "ollama"
    base_url = "http://ollama:11434"
    # Slow CPU nodes: tolerate long first-response + inter-chunk gaps, keep the
    # interactive model resident (no cold load per turn), and clamp the context
    # so prompt-eval stays cheap.
    connect_timeout_secs = 600
    stream_timeout_secs = 300
    keep_warm = true
    max_context_tokens = 4096

    [embeddings]

    [database]
    max_connections = 5

    [backend_tasks]
    # Off for the test so no surprise background LLM calls fire mid-smoke.
    dreaming_enabled = false
    dreaming_interval_secs = 3600
    archive_after_days = 7
    embedding_backfill_interval_secs = 300
    consolidation_interval_secs = 86400

    [purposes.interactive]
    connection = "default"
    model = "llama3.2:1b"

    [purposes.dreaming]
    connection = "default"
    model = "llama3.2:1b"

    [purposes.embedding]
    connection = "default"
    model = "llama3.2:1b"

    [purposes.titling]
    connection = "default"
    model = "llama3.2:1b"

    [profiling]
    enabled = false
    full_content = false

    [ws_auth]
    methods = ["password"]
    allowed_origins = []

    [tls]
    enabled = false

    [personality]
    professionalism = "always"
    warmth = "often"
    directness = "often"
    enthusiasm = "sometimes"
    humor = "sometimes"
    sarcasm = "rarely"
    pretentiousness = "rarely"
