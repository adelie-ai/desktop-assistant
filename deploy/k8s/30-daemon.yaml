apiVersion: apps/v1
kind: Deployment
metadata:
  name: adele-daemon
  namespace: adele-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adele-daemon
  template:
    metadata:
      labels:
        app: adele-daemon
    spec:
      initContainers:
        # Migrations auto-run on boot and need the DB (+ vector extension)
        # ready, so gate daemon start on Postgres accepting connections.
        - name: wait-for-postgres
          image: pgvector/pgvector:pg16
          command:
            - sh
            - -c
            - "until pg_isready -h postgres -U adele; do echo waiting for postgres; sleep 2; done"
      containers:
        - name: daemon
          image: truenas.lab.spadea.tech:30095/adele/adele-daemon:prove-split
          imagePullPolicy: Always # mutable tag on the TrueNAS registry; re-pull on rollout
          # Nodes already trust the registry's LE cert and it allows anonymous
          # pull, so no imagePullSecret is needed (same as the fstcore workloads).
          ports:
            - containerPort: 11339
          env:
            - name: RUST_LOG
              value: info
            - name: DESKTOP_ASSISTANT_WS_ENABLED
              value: "true"
            - name: DESKTOP_ASSISTANT_WS_BIND
              value: "0.0.0.0:11339"
            - name: DESKTOP_ASSISTANT_WS_TLS
              value: "false" # LAN/tailnet provides transport encryption; skip CA distribution
            - name: DESKTOP_ASSISTANT_UDS_ENABLED
              value: "false"
            - name: DESKTOP_ASSISTANT_DBUS_REQUIRED
              value: "false"
            - name: DESKTOP_ASSISTANT_WS_LOGIN_USERNAME
              value: "adele"
            - name: DESKTOP_ASSISTANT_WS_LOGIN_LOCAL_SYSTEM_AUTH
              value: "false" # pure static-password; no PAM/local users in-pod
            - name: DESKTOP_ASSISTANT_WS_LOGIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: adele-secrets
                  key: WS_LOGIN_PASSWORD
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: adele-secrets
                  key: POSTGRES_PASSWORD
            # $(POSTGRES_PASSWORD) is interpolated from the env defined above it.
            - name: DESKTOP_ASSISTANT_DATABASE_URL
              value: "postgres://adele:$(POSTGRES_PASSWORD)@postgres:5432/adele"
          volumeMounts:
            - name: config
              mountPath: /home/assistant/.config/desktop-assistant/daemon.toml
              subPath: daemon.toml
          readinessProbe:
            tcpSocket:
              port: 11339
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: adele-daemon-config
---
apiVersion: v1
kind: Service
metadata:
  name: adele-daemon
  namespace: adele-test
spec:
  selector:
    app: adele-daemon
  ports:
    - port: 11339
      targetPort: 11339
