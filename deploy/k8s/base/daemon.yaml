# Persistent state for the daemon. A single PVC is mounted at /state and the
# XDG config/data homes are pointed under it, so everything the daemon persists -
# daemon.toml, mcp_servers.toml, service accounts (XDG_CONFIG_HOME) and the
# per-connection secret files + system-id (XDG_DATA_HOME) - lives on the volume
# and survives pod restarts and rollouts. Mounting one dir (not deep XDG
# subpaths) keeps every write a child of a dir the daemon uid owns: kubelet
# creates a mount's parents as root, which would otherwise block the daemon
# (uid 10001) from creating sibling dirs like ~/.local/share/adelie.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: adele-daemon-state
spec:
  accessModes: ["ReadWriteOnce"]
  # local-path (node-local), not nfs-ssd: an init container chowns the volume to
  # the non-root daemon uid, and NFS root_squash would block that chown. A
  # single-replica brain doesn't need shared storage. Two storageclasses are
  # flagged default, so name it explicitly.
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adele-daemon
spec:
  replicas: 1
  strategy:
    type: Recreate # single RWO state volume; never run two pods against it at once
  selector:
    matchLabels:
      app: adele-daemon
  template:
    metadata:
      labels:
        app: adele-daemon
    spec:
      initContainers:
        # Seed + own the persistent state volume. The daemon self-bootstraps a
        # default daemon.toml when none exists (#484); we instead seed the
        # *tuned* config from the ConfigMap on a fresh volume, so the in-cluster
        # Ollama timeouts/purposes/personality are correct out of the box. The
        # copy is non-clobbering: once the volume holds a daemon.toml, runtime
        # edits made through the settings API win and persist (edit the ConfigMap
        # AND re-seed - see README - to change the baseline afterwards). Runs as
        # root to chown the hostPath-backed local-path volume to the daemon uid;
        # kubelet does not apply fsGroup to hostPath volumes.
        - name: init-state
          image: busybox:1.37
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /state/config/desktop-assistant /state/data
              if [ ! -f /state/config/desktop-assistant/daemon.toml ]; then
                cp /seed/daemon.toml /state/config/desktop-assistant/daemon.toml
                echo "seeded daemon.toml from ConfigMap"
              else
                echo "daemon.toml already present on volume; leaving as-is"
              fi
              chown -R 10001:10001 /state
          volumeMounts:
            - name: config-seed
              mountPath: /seed
            - name: state
              mountPath: /state
        # Migrations auto-run on boot and need the DB (+ vector extension)
        # ready, so gate daemon start on Postgres accepting connections.
        - name: wait-for-postgres
          image: pgvector/pgvector:pg16
          command:
            - sh
            - -c
            - "until pg_isready -h postgres -U adele; do echo waiting for postgres; sleep 2; done"
      containers:
        - name: daemon
          # Replace with the image you built and pushed (see deploy/k8s/README.md).
          image: registry.example.com:5000/adele/adele-daemon:prove-split
          imagePullPolicy: Always # mutable tag; re-pull on rollout
          # This example assumes a registry the nodes trust that allows anonymous
          # pull, so no imagePullSecret is needed; adjust for your registry.
          ports:
            - containerPort: 11339
          env:
            - name: RUST_LOG
              value: info
            # Point the XDG config/data homes at the persistent volume (see the
            # PVC above). State/cache stay on the (ephemeral) container fs under
            # the assistant home, which is writable and needs no persistence.
            - name: XDG_CONFIG_HOME
              value: /state/config
            - name: XDG_DATA_HOME
              value: /state/data
            - name: DESKTOP_ASSISTANT_WS_ENABLED
              value: "true"
            - name: DESKTOP_ASSISTANT_WS_BIND
              value: "0.0.0.0:11339"
            - name: DESKTOP_ASSISTANT_WS_TLS
              value: "false" # LAN/tailnet provides transport encryption; skip CA distribution
            - name: DESKTOP_ASSISTANT_UDS_ENABLED
              value: "false"
            - name: DESKTOP_ASSISTANT_DBUS_REQUIRED
              value: "false"
            - name: DESKTOP_ASSISTANT_WS_LOGIN_USERNAME
              value: "adele"
            - name: DESKTOP_ASSISTANT_WS_LOGIN_LOCAL_SYSTEM_AUTH
              value: "false" # pure static-password; no PAM/local users in-pod
            - name: DESKTOP_ASSISTANT_WS_LOGIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: adele-secrets
                  key: WS_LOGIN_PASSWORD
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: adele-secrets
                  key: POSTGRES_PASSWORD
            # $(POSTGRES_PASSWORD) is interpolated from the env defined above it.
            - name: DESKTOP_ASSISTANT_DATABASE_URL
              value: "postgres://adele:$(POSTGRES_PASSWORD)@postgres:5432/adele"
          volumeMounts:
            - name: state
              mountPath: /state
          readinessProbe:
            tcpSocket:
              port: 11339
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: adele-daemon-state
        # Read-only ConfigMap, used only to seed a fresh state volume (above).
        - name: config-seed
          configMap:
            name: adele-daemon-config
---
apiVersion: v1
kind: Service
metadata:
  name: adele-daemon
spec:
  selector:
    app: adele-daemon
  ports:
    - port: 11339
      targetPort: 11339
