# Example only - DO NOT COMMIT REAL VALUES.
#
# Deliberately NOT part of the kustomize base or any overlay: this Secret is
# created imperatively so credentials never land in git. Create one per
# environment namespace:
#
#   kubectl -n <namespace> create secret generic adele-secrets \
#     --from-literal=POSTGRES_PASSWORD="$(openssl rand -hex 16)" \
#     --from-literal=WS_LOGIN_PASSWORD="$(openssl rand -hex 16)"
#
# Note what does NOT belong here. A per-connection LLM credential (a cloud
# provider key) is held in the daemon's own secret store on the state PVC and
# set from a client via SetConnectionSecret - see README.md ("Connection
# secrets"). Putting it in this Secret would not wire it up.
#
# The manifest below documents the expected shape (name, type, keys).
apiVersion: v1
kind: Secret
metadata:
  name: adele-secrets
type: Opaque
stringData:
  POSTGRES_PASSWORD: replace-me
  WS_LOGIN_PASSWORD: replace-me
