# EXAMPLE Secret — placeholders only. DO NOT COMMIT REAL VALUES.
#
#   cp secret.example.yaml secret.yaml      # secret.yaml is gitignored
#   # edit secret.yaml with real values, then:
#   kubectl apply -f secret.yaml
#
# (The kustomization.yaml references `secret.yaml`, not this example file.)
#
# The Deployment pulls these in via `envFrom` so each key becomes an env var:
#   * DESKTOP_ASSISTANT_DATABASE_URL — the Postgres connection string (carries
#     the password; this is why the DB URL is NOT in the ConfigMap).
#   * the LLM credential vars — only the one matching your chosen [connections]
#     provider in the ConfigMap is actually used; leave the others as harmless
#     placeholders or delete them.
apiVersion: v1
kind: Secret
metadata:
  name: desktop-assistant-secrets
  labels:
    app: desktop-assistant
type: Opaque
stringData:
  # Postgres. Point at an in-cluster Postgres Service or a managed instance (RDS,
  # Cloud SQL, etc.). Format: postgres://<user>:<pass>@<host>:5432/<db>
  DESKTOP_ASSISTANT_DATABASE_URL: "postgres://assistant:CHANGE_ME@postgres.default.svc.cluster.local:5432/desktop_assistant"

  # LLM credentials. Supply only the one matching your [connections] provider.
  OPENAI_API_KEY: "sk-REPLACE_ME"
  ANTHROPIC_API_KEY: "sk-ant-REPLACE_ME"
  # Bedrock static creds: ACCESS_KEY_ID:SECRET_ACCESS_KEY[:SESSION_TOKEN]
  # (omit to fall back to the standard AWS credential chain / IRSA).
  AWS_BEDROCK_API_KEY: "AKIAREPLACEME:REPLACE_ME_SECRET"
