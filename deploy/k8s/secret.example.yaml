# Example only — DO NOT COMMIT REAL VALUES.
# The real Secret is created imperatively so creds never land in git:
#
#   kubectl -n adele-test create secret generic adele-secrets \
#     --from-literal=POSTGRES_PASSWORD="$(openssl rand -hex 16)" \
#     --from-literal=WS_LOGIN_PASSWORD="$(openssl rand -hex 16)"
#
# When switching inference to a cloud backend, add its credential to the same
# secret and reference it from the daemon Deployment / daemon.toml, e.g.:
#   --from-literal=OPENAI_API_KEY=sk-...        (OpenAI)
#   --from-literal=AWS_ACCESS_KEY_ID=...        (Bedrock)
#   --from-literal=AWS_SECRET_ACCESS_KEY=...    (Bedrock)
apiVersion: v1
kind: Secret
metadata:
  name: adele-secrets
  namespace: adele-test
type: Opaque
stringData:
  POSTGRES_PASSWORD: replace-me
  WS_LOGIN_PASSWORD: replace-me
