apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply with:  kubectl apply -k deploy/k8s/
#
# NOTE: secret.yaml (your real, gitignored copy of secret.example.yaml) is listed
# here. Create it before applying:  cp secret.example.yaml secret.yaml && edit.
# secret.example.yaml is intentionally NOT a resource — it holds only placeholders.
resources:
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

commonLabels:
  app: desktop-assistant
