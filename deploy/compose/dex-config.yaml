# Dex OIDC provider — development configuration for the compose reference stack.
#
# Run by the dex container as: `dex serve /etc/dex/config.yaml`.
#
# ── ISSUER / HOSTNAME (read this; it is the one subtle part) ───────────────
# An OIDC token's `iss` claim equals Dex's `issuer` here, and the daemon's
# OIDC validator pins acceptance to its configured `issuer_url` (it must match
# byte-for-byte) and fetches discovery + JWKS from that URL.
#
# The daemon's validator ONLY allows https:// OR an explicit loopback http://
# (localhost / 127.0.0.1 / ::1). A plaintext `http://dex:5556/...` issuer would
# be REJECTED, because `dex` is a non-loopback host. So the issuer MUST be
# `http://localhost:5556/dex`.
#
# But "localhost" inside the daemon container is the daemon container itself,
# not Dex. We bridge that gap by running the `assistant` service in the SAME
# network namespace as `dex` (`network_mode: "service:dex"` in the compose
# file). With a shared namespace, `localhost:5556` inside the daemon container
# resolves to Dex, AND the host's `localhost:5556` (published by the dex
# service) reaches the same Dex — so the issuer URL is identical for the daemon,
# the host browser, and wscat. One value, everyone agrees. See the README
# "Issuer / hostname" section for the tradeoff vs. an extra_hosts alias.
issuer: http://localhost:5556/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

oauth2:
  # Allow the resource-owner password grant so a token can be obtained
  # non-interactively (curl) for testing — no browser round-trip needed.
  passwordConnector: local
  skipApprovalScreen: true

staticClients:
  - id: desktop-assistant
    name: Desktop Assistant
    # Must equal DEX_CLIENT_SECRET in your .env. The token endpoint requires
    # client authentication for the password grant.
    secret: desktop-assistant-dev-secret
    redirectURIs:
      - http://localhost:11339/callback
      - http://localhost:5555/callback

# Enable the built-in local password database so `staticPasswords` works and
# the password grant can authenticate a user.
enablePasswordDB: true

staticPasswords:
  # email:    dev@example.com
  # password: password
  #
  # `hash` is the bcrypt hash of the literal string "password". This is Dex's
  # own documented example hash. Regenerate for a different password with:
  #   htpasswd -bnBC 10 "" 'your-password' | tr -d ':\n' | sed 's/$2y/$2a/'
  # (Dex expects a $2a$ / $2b$ bcrypt hash.)
  - email: "dev@example.com"
    hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leD81F8os9aG"
    username: "dev"
    userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
