# Curated default MCP server fleet for the adele-daemon composable base image.
#
# Every server binary is bundled at /opt/adele/mcp/<name>-mcp and speaks stdio
# via `<name>-mcp serve`. On first boot the daemon seeds THIS file into its
# config (via DESKTOP_ASSISTANT_MCP_DEFAULT_CONFIG, issue #491) ONLY when no
# mcp_servers.toml exists yet - runtime edits from the settings UI win and
# persist. Downstream images can replace this file, or COPY extra binaries into
# /opt/adele/mcp, to change the shipped fleet (see deploy/mcp/README.md).
#
# Tiering (danger x usefulness): safe, zero-config servers ship ENABLED.
# Powerful/dangerous servers, and servers that need a runtime dependency or
# secret the headless base lacks, ship configured-but-DISABLED - flip
# `enabled = true`, provide the dependency, or derive an image.

# --- Enabled: safe, useful, start with zero configuration --------------------

[[servers]]
name = "weather-forecast"
description = "Live weather conditions and multi-day forecasts for any location."
command = "/opt/adele/mcp/weather-forecast-mcp"
args = ["serve"]
enabled = true

[[servers]]
name = "geocode"
description = "Convert between place names or addresses and geographic coordinates."
command = "/opt/adele/mcp/geocode-mcp"
args = ["serve"]
enabled = true

[[servers]]
name = "openstreetmap"
description = "Look up places, addresses, routes, and points of interest from OpenStreetMap."
command = "/opt/adele/mcp/openstreetmap-mcp"
args = ["serve"]
enabled = true

[[servers]]
name = "cve"
description = "Look up CVE vulnerability details and scan package lists for known advisories."
command = "/opt/adele/mcp/cve-mcp"
args = ["serve"]
enabled = true

[[servers]]
name = "tasks"
description = "Create, organize, and track to-do tasks and projects."
command = "/opt/adele/mcp/tasks-mcp"
args = ["serve"]
enabled = true

[[servers]]
name = "timeclock"
description = "Track work time: clock in and out, log hours, and report on time entries."
command = "/opt/adele/mcp/timeclock-mcp"
args = ["serve"]
enabled = true

[[servers]]
name = "skills"
description = "Discover and read reusable skill playbooks for how to perform specific tasks."
command = "/opt/adele/mcp/skills-mcp"
args = ["serve"]
enabled = true

# --- Disabled: powerful/dangerous or needs a runtime dep/secret (opt-in) ------

# Arbitrary shell execution. Enable only on a host you trust the assistant to
# run shell commands on.
[[servers]]
name = "terminal"
description = "Run arbitrary shell commands on the host (powerful and dangerous)."
command = "/opt/adele/mcp/terminal-mcp"
args = ["serve"]
enabled = false

# Executes configured commands. `serve` REQUIRES a --config file (bare serve
# errors out), so before enabling, generate one - `command-mcp config example` -
# and set e.g. args = ["serve", "--config", "/opt/adele/command-mcp.toml"].
[[servers]]
name = "command"
description = "Run a curated allowlist of preconfigured commands."
command = "/opt/adele/mcp/command-mcp"
args = ["serve"]
enabled = false

# Full filesystem read/write/remove/chown/move. Enable only with intent (its
# PathGuard deny-defaults still apply).
[[servers]]
name = "fileio"
description = "Read, write, move, and remove files on the local filesystem."
command = "/opt/adele/mcp/fileio-mcp"
args = ["serve"]
enabled = false

# Home Assistant control. Needs HOMEASSISTANT_URL + HOMEASSISTANT_TOKEN in the
# environment to be useful (it starts, but tool calls fail until configured).
# Prefer env_secrets for the token (seed a secret, then reference it here).
[[servers]]
name = "homeassistant"
description = "Read and control Home Assistant devices, entities, scenes, and automations."
command = "/opt/adele/mcp/homeassistant-mcp"
args = ["serve"]
enabled = false
# [servers.env]
# HOMEASSISTANT_URL = "http://homeassistant.local:8123"

# Headless web browsing/scraping. Chromium is bundled in the base runtime image
# (see Dockerfile.fleet) with WEB_CHROME_PATH pointing web-mcp at it, so this is
# enabled by default. In a container Chrome must run with --no-sandbox, and
# --disable-dev-shm-usage avoids crashes on the small default /dev/shm. The SSRF
# guard (WEB_ALLOW_PRIVATE_HOSTS=false) stays on by default.
[[servers]]
name = "web"
description = "Browse and scrape web pages, following links and extracting page content."
command = "/opt/adele/mcp/web-mcp"
args = ["serve", "--chrome-arg=--no-sandbox", "--chrome-arg=--disable-dev-shm-usage"]
enabled = true

# Internet radio playback. Needs the `mpv` binary plus an audio sink routed into
# the container. On a headless brain image it starts but cannot play.
[[servers]]
name = "internet-radio"
description = "Search internet radio stations and play them."
command = "/opt/adele/mcp/internet-radio-mcp"
args = ["serve"]
enabled = false
