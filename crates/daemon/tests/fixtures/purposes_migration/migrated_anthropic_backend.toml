[llm]
connector = "openai"
model = "gpt-5.4"
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"

[connections.default]
type = "openai"
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"

[connections.backend]
type = "anthropic"
base_url = "https://api.anthropic.com"

[embeddings]

[persistence.git]
enabled = false
remote_name = "origin"
push_on_update = true

[database]
max_connections = 5

[backend_tasks]
dreaming_enabled = true
dreaming_interval_secs = 3600
archive_after_days = 7

[purposes.interactive]
connection = "default"
model = "gpt-5.4"

[purposes.dreaming]
connection = "backend"
model = "claude-haiku-4-5-20251001"

[purposes.embedding]
connection = "primary"
model = "primary"

[purposes.titling]
connection = "backend"
model = "claude-haiku-4-5-20251001"

[profiling]
enabled = false
full_content = false

[ws_auth]
methods = ["password"]
allowed_origins = []

[tls]
enabled = true
