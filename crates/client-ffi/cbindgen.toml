# Drives build.rs's cbindgen run. Emit C (not C++) but WITH `extern "C"` guards so
# the adele-kde Qt/C++ plugin can #include it directly. Deps are not parsed, so the
# handle struct (Runtime + Arc<Connector>) surfaces as an opaque type — which is
# exactly the C ABI contract we want.
language = "C"
header = "/* desktop-assistant client FFI: a C ABI over client-common's UDS Connector. */"
autogen_warning = "/* GENERATED by cbindgen (build.rs) from desktop-assistant-client-ffi. Do not edit by hand. */"
include_guard = "ADELE_CLIENT_H"
cpp_compat = true
documentation = true
documentation_style = "doxy"
tab_width = 4

[parse]
parse_deps = false
