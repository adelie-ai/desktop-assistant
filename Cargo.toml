[workspace]
resolver = "3"
members = [
    "crates/core",
    "crates/dbus-interface",
    "crates/daemon",
    "crates/llm-openai",
    "crates/llm-anthropic",
    "crates/llm-ollama",
    "crates/mcp-client",
    "crates/tui",
]

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
zbus = { version = "5", default-features = false, features = ["tokio"] }
thiserror = "2"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }

desktop-assistant-core = { path = "crates/core" }
desktop-assistant-dbus = { path = "crates/dbus-interface" }
desktop-assistant-llm-anthropic = { path = "crates/llm-anthropic" }
desktop-assistant-llm-openai = { path = "crates/llm-openai" }
desktop-assistant-llm-ollama = { path = "crates/llm-ollama" }
desktop-assistant-mcp-client = { path = "crates/mcp-client" }
serde_json = "1"
toml = "0.8"
chrono = { version = "0.4", features = ["clock"] }
